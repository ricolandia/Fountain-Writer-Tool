" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">jargões técnicos e seja breve.</text></g><g stroke-linecap="round" transform="translate(5 453.3338187738297) rotate(0 236.67034932659934 112.10700757575759)"><path d="M10 0 C176.06 0, 342.13 0, 463.34 0 C470.01 0, 473.34 3.33, 473.34 10 C473.34 86.61, 473.34 163.21, 473.34 214.21 C473.34 220.88, 470.01 224.21, 463.34 224.21 C331.82 224.21, 200.3 224.21, 10 224.21 C3.33 224.21, 0 220.88, 0 214.21 C0 144.59, 0 74.96, 0 10 C0 3.33, 3.33 0, 10 0" stroke="none" stroke-width="0" fill="#fef2f2"></path><path d="M10 0 C120.86 0, 231.71 0, 463.34 0 M10 0 C178.07 0, 346.14 0, 463.34 0 M463.34 0 C470.01 0, 473.34 3.33, 473.34 10 M463.34 0 C470.01 0, 473.34 3.33, 473.34 10 M473.34 10 C473.34 87.16, 473.34 164.32, 473.34 214.21 M473.34 10 C473.34 51.91, 473.34 93.83, 473.34 214.21 M473.34 214.21 C473.34 220.88, 470.01 224.21, 463.34 224.21 M473.34 214.21 C473.34 220.88, 470.01 224.21, 463.34 224.21 M463.34 224.21 C349.3 224.21, 235.26 224.21, 10 224.21 M463.34 224.21 C320 224.21, 176.65 224.21, 10 224.21 M10 224.21 C3.33 224.21, 0 220.88, 0 214.21 M10 224.21 C3.33 224.21, 0 220.88, 0 214.21 M0 214.21 C0 146.19, 0 78.17, 0 10 M0 214.21 C0 135.89, 0 57.57, 0 10 M0 10 C0 3.33, 3.33 0, 10 0 M0 10 C0 3.33, 3.33 0, 10 0" stroke="#ef4444" stroke-width="2" fill="none"></path></g><g transform="translate(29.912668350168218 478.2464871239981) rotate(0 211.757680976431 80.96617213804717)"><text x="0" y="19.548578350097113" font-family="Helvetica, Segoe UI Emoji" font-size="22.42140151515152px" fill="#991b1b" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">3. Identifique Lacunas</text><text x="0" y="46.537302396112835" font-family="Helvetica, Segoe UI Emoji" font-size="22.42140151515152px" fill="#991b1b" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic"></text><text x="0" y="73.52602644212855" font-family="Helvetica, Segoe UI Emoji" font-size="22.42140151515152px" fill="#991b1b" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">Onde você travou? Onde a sua</text><text x="0" y="100.51475048814427" font-family="Helvetica, Segoe UI Emoji" font-size="22.42140151515152px" fill="#991b1b" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">explicação ficou confusa? Volte</text><text x="0" y="127.50347453415999" font-family="Helvetica, Segoe UI Emoji" font-size="22.42140151515152px" fill="#991b1b" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">ao material de estudo original e</text><text x="0" y="154.49219858017568" font-family="Helvetica, Segoe UI Emoji" font-size="22.42140151515152px" fill="#991b1b" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">reaprenda esses pontos cegos.</text></g><g stroke-linecap="round" transform="translate(627.8167087542088 453.3338187738297) rotate(0 236.6703493265993 112.10700757575759)"><path d="M10 0 C103.51 0, 197.03 0, 463.34 0 C470.01 0, 473.34 3.33, 473.34 10 C473.34 56.12, 473.34 102.24, 473.34 214.21 C473.34 220.88, 470.01 224.21, 463.34 224.21 C299.7 224.21, 136.07 224.21, 10 224.21 C3.33 224.21, 0 220.88, 0 214.21 C0 167.77, 0 121.32, 0 10 C0 3.33, 3.33 0, 10 0" stroke="none" stroke-width="0" fill="#ecfdf5"></path><path d="M10 0 C120.86 0, 231.72 0, 463.34 0 M10 0 C152.68 0, 295.36 0, 463.34 0 M463.34 0 C470.01 0, 473.34 3.33, 473.34 10 M463.34 0 C470.01 0, 473.34 3.33, 473.34 10 M473.34 10 C473.34 53.47, 473.34 96.93, 473.34 214.21 M473.34 10 C473.34 88.48, 473.34 166.95, 473.34 214.21 M473.34 214.21 C473.34 220.88, 470.01 224.21, 463.34 224.21 M473.34 214.21 C473.34 220.88, 470.01 224.21, 463.34 224.21 M463.34 224.21 C335.09 224.21, 206.84 224.21, 10 224.21 M463.34 224.21 C305.65 224.21, 147.97 224.21, 10 224.21 M10 224.21 C3.33 224.21, 0 220.88, 0 214.21 M10 224.21 C3