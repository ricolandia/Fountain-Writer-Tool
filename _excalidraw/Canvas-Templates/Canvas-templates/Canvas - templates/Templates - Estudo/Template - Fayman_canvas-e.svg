direction="ltr" dominant-baseline="alphabetic">1. Escolha o Conceito</text><text x="0" y="46.537302396112835" font-family="Helvetica, Segoe UI Emoji" font-size="22.42140151515152px" fill="#1e40af" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic"></text><text x="0" y="73.52602644212855" font-family="Helvetica, Segoe UI Emoji" font-size="22.42140151515152px" fill="#1e40af" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">Escreva o nome do tópico no topo</text><text x="0" y="100.51475048814427" font-family="Helvetica, Segoe UI Emoji" font-size="22.42140151515152px" fill="#1e40af" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">de uma página em branco. Estude</text><text x="0" y="127.50347453415999" font-family="Helvetica, Segoe UI Emoji" font-size="22.42140151515152px" fill="#1e40af" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">o assunto até entender os</text><text x="0" y="154.49219858017568" font-family="Helvetica, Segoe UI Emoji" font-size="22.42140151515152px" fill="#1e40af" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">fundamentos básicos.</text></g><g stroke-linecap="round" transform="translate(627.8167087542088 104.55646187147283) rotate(0 236.6703493265993 112.10700757575756)"><path d="M10 0 C157.94 0, 305.89 0, 463.34 0 C470.01 0, 473.34 3.33, 473.34 10 C473.34 76.25, 473.34 142.5, 473.34 214.21 C473.34 220.88, 470.01 224.21, 463.34 224.21 C363.94 224.21, 264.53 224.21, 10 224.21 C3.33 224.21, 0 220.88, 0 214.21 C0 162.25, 0 110.28, 0 10 C0 3.33, 3.33 0, 10 0" stroke="none" stroke-width="0" fill="#fffbeb"></path><path d="M10 0 C120.85 0, 231.71 0, 463.34 0 M10 0 C112.8 0, 215.59 0, 463.34 0 M463.34 0 C470.01 0, 473.34 3.33, 473.34 10 M463.34 0 C470.01 0, 473.34 3.33, 473.34 10 M473.34 10 C473.34 80.01, 473.34 150.03, 473.34 214.21 M473.