<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body, #root { width: 100%; height: 100%; overflow: hidden; }
</style>
</head>
<body>
<div id="root"></div>
<script>
// Read scene from URL query parameter
const params = new URLSearchParams(location.search);
const sceneData = params.get('scene');
if (sceneData) {
  var pendingScene = null;
  try { pendingScene = JSON.parse(decodeURIComponent(sceneData)); } catch(e) {}
  if (pendingScene) {
    window.addEventListener('message', function __exReady(e) {
      if (e.data && e.data.type === 'EXCALIDRAW_READY') {
        window.removeEventListener('message', __exReady);
        window.postMessage({ type: 'LOAD_SCENE', scene: pendingScene }, '*');
        pendingScene = null;
      }
    });
  }
}
</script>
<script src="lib/excalidraw-embed.js"></script>
</body>
</html>
