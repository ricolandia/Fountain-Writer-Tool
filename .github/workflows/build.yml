name: Build Desktop

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r desktop/requirements.txt pyinstaller
      - run: pyinstaller --onefile --windowed --name Fonte desktop/desktop.py
      - uses: actions/upload-artifact@v4
        with:
          name: Fonte-windows
          path: dist/Fonte.exe

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev 2>/dev/null || sudo apt-get install -y libgtk-3-dev libwebkitgtk-6.0-dev
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r desktop/requirements.txt pyinstaller
      - run: pyinstaller --onefile --windowed --name Fonte desktop/desktop.py
      - run: mkdir -p AppDir/usr/bin && cp dist/Fonte AppDir/usr/bin/Fonte && chmod +x AppDir/usr/bin/Fonte
      - run: |
          cat > AppDir/AppRun << RUNEOF
          #!/bin/bash
          HERE="\$(dirname "\$(readlink -f "\$0")")"
          exec "\$HERE/usr/bin/Fonte"
          RUNEOF
          chmod +x AppDir/AppRun
      - run: |
          cat > AppDir/fonte.desktop << DESKEOF
          [Desktop Entry]
          Name=Fonte
          Comment=Screenplay Editor
          Exec=Fonte
          Icon=fonte
          Type=Application
          Categories=Office;
          DESKEOF
      - run: cp deploy/icons/icon-512.png AppDir/fonte.png
      - run: wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O /tmp/appimagetool && chmod +x /tmp/appimagetool
      - run: /tmp/appimagetool --appimage-extract-and-run AppDir Fonte.AppImage
      - uses: actions/upload-artifact@v4
        with:
          name: Fonte-linux
          path: Fonte.AppImage

  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r desktop/requirements.txt pyinstaller
      - run: pyinstaller --onefile --windowed --name Fonte desktop/desktop.py
      - run: |
          # Check output
          if [ -f "dist/Fonte" ]; then
            echo "Found single binary dist/Fonte"
            mkdir -p dist/Fonte.app/Contents/MacOS
            cp dist/Fonte dist/Fonte.app/Contents/MacOS/Fonte
          fi
          if [ -d "dist/Fonte.app" ]; then
            echo "Found .app bundle"
            mkdir -p dmg
            cp -R dist/Fonte.app dmg/
            hdiutil create -volname "Fonte" -srcfolder dmg -ov -format UDZO Fonte.dmg
            ls -lh Fonte.dmg
          else
            echo "ERROR: No .app bundle found"
            ls dist/ || true
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: Fonte-macos
          path: Fonte.dmg

  release:
    needs: [build-windows, build-linux, build-macos]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - run: |
          mkdir -p _release
          [ -f "Fonte-windows/Fonte.exe" ] && cp "Fonte-windows/Fonte.exe" _release/
          [ -f "Fonte-linux/Fonte.AppImage" ] && cp "Fonte-linux/Fonte.AppImage" _release/
          [ -f "Fonte-macos/Fonte.dmg" ] && cp "Fonte-macos/Fonte.dmg" _release/
          ls -lh _release/
      - uses: softprops/action-gh-release@v2
        with:
          files: _release/*
          generate_release_notes: true
          make_latest: true
