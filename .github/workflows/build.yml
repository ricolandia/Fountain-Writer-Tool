name: Build Web

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cd web && zip -r ../Fonte-web.zip . -x "docker-compose.yml" -x "Dockerfile" -x "test-excalidraw.html" && cd ..
      - uses: actions/upload-artifact@v4
        with:
          name: Fonte-web
          path: Fonte-web.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - run: |
          mkdir -p _release
          cp Fonte-web/Fonte-web.zip _release/
      - uses: softprops/action-gh-release@v2
        with:
          files: _release/*
          body_path: CHANGELOG.md
          make_latest: true
